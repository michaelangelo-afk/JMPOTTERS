# =============================================================
# Codebuff PR Workflow
# =============================================================
# Whenever commits are pushed to a `codebuff/**` branch, this
# workflow opens (or updates) a Pull Request against `main`.
#
# Design goals:
#   - Idempotent: never create duplicate PRs for the same branch.
#   - No local runner time wasted: pure API calls.
#   - Self-bootstrapping: the workflow file itself can be updated
#     from a codebuff/** branch without breaking the loop.
# =============================================================

name: Codebuff PR

on:
  push:
    branches:
      - 'codebuff/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  # One running job per branch. Don't cancel: cancel-in-progress
  # would lose commits mid-PR.
  group: cbpr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: Open or update PR
    runs-on: ubuntu-latest
    steps:
      - name: Resolve default branch
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.setOutput('default_branch', repo.default_branch);
            core.info(`Default branch is: ${repo.default_branch}`);

      - name: Open or update PR
        id: open-pr
        uses: actions/github-script@v7
        env:
          DEFAULT_BRANCH: ${{ steps.meta.outputs.default_branch }}
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const repo = context.repo;
            const head = `${repo.owner}:${branch}`;

            // 1. Check for an existing open PR for this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: repo.owner,
              repo: repo.repo,
              head: head,
              state: 'open',
              per_page: 1,
            });

            if (existingPRs.length > 0) {
              const pr = existingPRs[0];
              core.notice(`PR #${pr.number} already open for ${branch} - no action needed.`);
              core.setOutput('pr_url', pr.html_url);
              core.setOutput('pr_number', String(pr.number));
              core.setOutput('newly_created', 'false');
              return;
            }

            // 2. Skip if the branch has been merged or closed already
            const { data: closedPRs } = await github.rest.pulls.list({
              owner: repo.owner,
              repo: repo.repo,
              head: head,
              state: 'closed',
              per_page: 1,
            });
            if (closedPRs.length > 0) {
              core.info(`PR for ${branch} already closed/merged. Skipping.`);
              return;
            }

            // 3. Open a new PR
            const title = `Codebuff: ${branch.replace(/^codebuff\//, '')}`;
            const body = [
              '## Automated PR from a Codebuff coding session',
              '',
              `**Source branch:** \`${branch}\``,
              `**Latest commit:** \`${context.sha.substring(0, 7)}\``,
              `**Pushed by:** @${context.actor}`,
              `**Target branch:** \`${process.env.DEFAULT_BRANCH}\``,
              '',
              '_This PR was opened automatically by the **Codebuff PR** workflow when changes were pushed to a `codebuff/**` branch._',
              '',
              '- [ ] Reviewed by maintainer',
              '- [ ] Tests pass',
              '- [ ] Ready to merge',
              '',
              'Please review the diff, run any tests, and merge when ready.',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: repo.owner,
              repo: repo.repo,
              title: title,
              head: branch,
              base: process.env.DEFAULT_BRANCH,
              body: body,
              draft: false,
            });

            core.notice(`Opened PR #${pr.number}: ${pr.html_url}`);
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('newly_created', 'true');

      - name: Comment with PR link
        if: steps.open-pr.outputs.pr_url
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.open-pr.outputs.pr_url }}';
            const prNumber = '${{ steps.open-pr.outputs.pr_number }}';
            const newlyCreated = '${{ steps.open-pr.outputs.newly_created }}' === 'true';
            if (!newlyCreated) return;
            const body = `🤖 Codebuff PR workflow opened a PR for this push:\n\n${prUrl}\n\n/cc @${context.actor}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber, 10),
              body,
            });
